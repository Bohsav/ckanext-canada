# General setup according to https://github.com/open-data/ckanext-canada
debug = true
sqlalchemy.url = postgresql://ckandbuser:ckandbpassword@db/ckandb
beaker.session.secret = beaker-secret

ckanext.power_bi.internal_i18n = true

recombinant.definitions = ckanext.canada:tables/ati.yaml ckanext.canada:tables/briefingt.yaml ckanext.canada:tables/qpnotes.yaml ckanext.canada:tables/contracts.yaml ckanext.canada:tables/contractsa.yaml ckanext.canada:tables/grants.yaml ckanext.canada:tables/hospitalityq.yaml ckanext.canada:tables/reclassification.yaml ckanext.canada:tables/travela.yaml ckanext.canada:tables/travelq.yaml ckanext.canada:tables/wrongdoing.yaml ckanext.canada:tables/inventory.yaml ckanext.canada:tables/consultations.yaml ckanext.canada:tables/service.yaml ckanext.canada:tables/dac.yaml ckanext.canada:tables/nap5.yaml ckanext.canada:tables/experiment.yaml ckanext.canada:tables/adminaircraft.yaml ckanext.canada:tables/aistrategy.yaml

recombinant.tables = ckanext.canada:recombinant_tables.yaml

scheming.dataset_schemas = ckanext.canada:schemas/dataset.yaml ckanext.canada:schemas/info.yaml ckanext.canada:schemas/prop.yaml

scheming.presets = ckanext.scheming:presets.json ckanext.fluent:presets.json ckanext.canada:schemas/presets.yaml ckanext.validation:presets.json

scheming.organization_schemas = ckanext.canada:schemas/organization.yaml

ckanext.csrf_filter.same_site = Strict
ckanext.csrf_filter.exempt_rules = ^/datatable.*
ckanext.xloader.clean_datastore_tables = True
ckanext.validation.clean_validation_reports = True
ckan.feeds.pretty = True
ckan.feeds.include_private = True
ckan.auth.create_dataset_if_not_in_organization = false
ckan.activity_streams_email_notifications = false
ckan.record_private_activity = True
ckan.activity_streams_enabled = True
ckan.csrf_protection.ignore_extensions = False

# CKAN literally explodes without this string
licenses_group_url = file:///srv/app/src/ckanext-canada/ckanext/canada/public/static/licenses.json

ckanext.canada.datastore_source_domain_allow_list = canada.ca www.canada.ca localhost

ckan.locales_offered = en fr

## Security 192.168.232.65
ckanext.security.domain = 

ckanext.security.redis.host = redis
ckanext.security.redis.port = 6379
ckanext.security.redis.db = 1
ckanext.security.redis.password = 

# 15 minute timeout with 10 attempts
ckanext.security.lock_timeout = 900
ckanext.security.login_max_count = 10
ckanext.security.brute_force_key = user_name

# If using 2.7.7 or recent patches of 2.8, the password reset behaviour has been fixed in CKAN core
# (no longer discloses info about non-existent accounts) and the way this plugin overrides the password
# reset may be broken due to permission restrictions on user lookups,
# You can disable the fix in this plugin by:
ckanext.security.disable_password_reset_override = true

# Two factor authentication is enabled for all users by default
# optional configuration to disable 2fa
ckanext.security.enable_totp = false

# Provide a help page to allow 2fa users to contact support or get more information
# Shows up as 'Need help?' on the 2fa entry form beside the submit button. Does not display a link if none provided
ckanext.security.mfa_help_link = https://data.govt.nz/catalogue-guide/releasing-data-on-data-govt-nz/how-do-i-set-up-two-factor-authentication/
